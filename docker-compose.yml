version: '3.9'

services:

  eureka-server:
    build:
      context: ../donaton-eureka/proyecto
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"

  mysql:
    image: mysql:8.0
    container_name: donaton-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  necesidades-service:
    build:
      context: ../donaton-necesidades-service/necesidades-service
    container_name: necesidades-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/donaton_necesidades?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - mysql
      - eureka-server

  donaciones-service:
    build:
      context: ../donaton-donaciones-service/donaciones-service
    container_name: donaciones-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/donaton_donaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - mysql
      - eureka-server

  logistica-service:
    build:
      context: ../donaton-logistica-service/logistica-service
    container_name: logistica-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/donaton_logistica?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - donaciones-service
      - necesidades-service

  api-gateway:
    build:
      context: ../donaton-api-gateway/api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVICES_NECESIDADES_URL: http://necesidades-service:8083
      SERVICES_DONACIONES_URL: http://donaciones-service:8082
      SERVICES_LOGISTICA_URL: http://logistica-service:8084
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - necesidades-service
      - donaciones-service
      - logistica-service

  donaton-bff:
    build:
      context: ../donaton-bff
    container_name: donaton-bff
    restart: always
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - api-gateway

  donaton-frontend:
    build:
      context: ../donaton-front
    container_name: donaton-frontend
    restart: always
    ports:
      - "5173:5173"

volumes:
  mysql_data: