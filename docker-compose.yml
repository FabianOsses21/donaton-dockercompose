services:

  # Base de Datos Central
  mysql:
    image: mysql:8.0
    container_name: donaton-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Microservicio: Donaciones
  donaciones-service:
    build:
      context: ../donaton-donaciones-service/donaciones-service
      dockerfile: Dockerfile
    container_name: donaciones-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/donaton_donaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - donaton-network

  # Microservicio: Necesidades
  necesidades-service:
    build:
      context: ../donaton-necesidades-service/necesidades-service
      dockerfile: Dockerfile
    container_name: necesidades-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/donaton_necesidades?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - donaton-network

  # Microservicio: Logística
  logistica-service:
    build:
      context: ../donaton-logistica-service/logistica-service
      dockerfile: Dockerfile
    container_name: logistica-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/donaton_logistica?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      DONACIONES_SERVICE_URL: http://donaciones-service:8082/api/v1/donaciones
      NECESIDADES_SERVICE_URL: http://necesidades-service:8083/api/v1/necesidades
    depends_on:
      - mysql
      - donaciones-service
      - necesidades-service
    networks:
      - donaton-network

  # API Gateway
  api-gateway:
    build:
      context: ../donaton-api-gateway/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVICES_NECESIDADES_URL: http://necesidades-service:8083
      SERVICES_DONACIONES_URL: http://donaciones-service:8082
      SERVICES_LOGISTICA_URL: http://logistica-service:8084
    depends_on:
      - necesidades-service
      - donaciones-service
      - logistica-service
    networks:
      - donaton-network

  # Frontend React + Vite
  frontend:
    build:
      context: ../donaton-front
      dockerfile: Dockerfile
    container_name: donaton-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_BFF_URL: http://api-gateway:8080/api
    depends_on:
      - api-gateway
    networks:
      - donaton-network

volumes:
  mysql_data:

networks:
  donaton-network:
    driver: bridge
