version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: donaton-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  necesidades-service:
    build:
      context: ./necesidades-service/necesidades-service
    container_name: necesidades-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/donaton_necesidades?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      - mysql

  donaciones-service:
    build:
      context: ./donaciones-service/donaciones-service
    container_name: donaciones-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/donaton_donaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    depends_on:
      - mysql

  logistica-service:
    build:
      context: ./logistica-service/logistica-service
    container_name: logistica-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/donaton_logistica?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

      DONACIONES_SERVICE_URL: http://host.docker.internal:8082/api/v1/donaciones
      NECESIDADES_SERVICE_URL: http://host.docker.internal:8083/api/v1/necesidades

    depends_on:
      - donaciones-service
      - necesidades-service

  api-gateway:
    build:
      context: ./api-gateway/api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVICES_NECESIDADES_URL: http://host.docker.internal:8083
      SERVICES_DONACIONES_URL: http://host.docker.internal:8082
      SERVICES_LOGISTICA_URL: http://host.docker.internal:8084
    depends_on:
      - necesidades-service
      - donaciones-service
      - logistica-service

volumes:
  mysql_data: